<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>HUST MEN - Tham gia ngay</title>

<meta property="og:title" content="THÔNG TIN">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tnct123.github.io/SHOPPE-HUST-MEN/">
<meta property="og:image" content="https://tnct123.github.io/SHOPPE-HUST-MEN/logo.png">

<link rel="icon" href="logo.png">

<style>
/* CSS Reset and Mobile-First Principles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100dvh;
    overflow-x: hidden; /* Prevent horizontal overflow */
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #ffcc99, #ffffff);
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative; /* Context for background decor */
}

/* Wrapper to contain the form card and ensure vertical centering */
.wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 10;
}

/* The central form card */
.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 95%; /* Responsive width */
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    z-index: 20;
}

.logo {
    width: 200px;
    margin-bottom: 15px;
}

.title {
    font-size: 28px;
    font-weight: bold;
    color: #ff9800;
    margin-bottom: 10px;
}

p.instruction {
    font-size: 16px;
    color: #333;
    margin-bottom: 20px;
}

/* Form inputs and select - consistent width and styling */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px; /* 16px to prevent auto-zoom on iOS */
    font-family: inherit;
    color: #333;
}

textarea {
    min-height: 100px;
    resize: none;
}

/* Dropdown styling */
select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23999' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 20px;
    cursor: pointer;
}

/* Button styling */
button {
    width: 100%;
    padding: 15px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    transition: background 0.3s ease;
}

button:hover {
    background: #e68900;
}

/* =========================================
   DECORATION ELEMENTS (Keep styles, repositioned to prevent overflow)
   ========================================= */

.decor-item {
    position: absolute;
    z-index: 2; 
    pointer-events: none; 
}

.decor-item img {
    width: 100%;
    border-radius: 24px; 
    box-shadow: 0 20px 45px rgba(0,0,0,0.25); 
    object-fit: cover;
}

/* Common float animation */
@keyframes floatSmooth {
    0% { transform: translate3d(0, 0px, 0) rotate(0deg); }
    100% { transform: translate3d(0, -30px, 0) rotate(5deg); }
}

.float-1 { animation: floatSmooth 8s ease-in-out infinite alternate; animation-delay: 0.5s; }
.float-2 { animation: floatSmooth 9.5s ease-in-out infinite alternate; animation-delay: 1.8s; }
.float-3 { animation: floatSmooth 11s ease-in-out infinite alternate; animation-delay: 3.2s; }
.float-4 { animation: floatSmooth 7.5s ease-in-out infinite alternate; animation-delay: 1.1s; }
.float-5 { animation: floatSmooth 9s ease-in-out infinite alternate; animation-delay: 4.5s; }
.float-6 { animation: floatSmooth 8.5s ease-in-out infinite alternate; animation-delay: 2.5s; }

/* Blur levels */
.blur-sm { filter: blur(3px) opacity(0.8); }
.blur-md { filter: blur(6px) opacity(0.6); }

/* Repositioned Specific Items for Mobile/Desktop Harmony */
/* Item 3 (Products Top-Left) */
.item-3 { top: 5%; left: 5%; width: 150px; transform: rotate(-10deg); }
/* Item 4 (Products Bottom-Right) */
.item-4 { bottom: 5%; right: 5%; width: 160px; transform: rotate(15deg); }
/* Item 5 (Product Bottom-Left) */
.item-5 { bottom: 15%; left: 8%; width: 140px; transform: rotate(10deg); }
/* Item 6 (Product Top-Right) */
.item-6 { top: 10%; right: 8%; width: 130px; transform: rotate(-15deg); }

/* Ingredient Items (Blurred) */
/* Pineapple (blur-sm, float-4) */
.item-pineapple { top: 35%; left: 15%; width: 100px; transform: rotate(20deg); }
/* Rose (blur-md, float-6) */
.item-rose { top: 15%; left: 35%; width: 80px; transform: rotate(-25deg); }
/* Jasmine (blur-sm, float-2) */
.item-jasmine { bottom: 25%; right: 15%; width: 90px; transform: rotate(-10deg); }
/* Cinnamon (blur-md, float-5) */
.item-cinnamon { top: 45%; right: 12%; width: 110px; transform: rotate(30deg); }
/* Coffee Bean (blur-md, float-1) */
.item-coffee { bottom: 8%; left: 30%; width: 70px; transform: rotate(-20deg); }
/* Orange (blur-sm, float-3) */
.item-orange { top: 1%; right: 35%; width: 90px; transform: rotate(8deg); }

/* Responsive adjustments for smaller screens */
@media screen and (max-width: 600px) {
    .decor-item {
        opacity: 0.6; /* Soften decor on very small screens */
    }
    .item-3 { width: 100px; }
    .item-4 { width: 110px; }
    .item-pineapple { left: 10%; width: 80px; }
    .item-cinnamon { right: 8%; width: 90px; }
}

</style>

</head>

<body>

<div class="decor-item item-3 float-1">
    <img src="3.jpg" alt="Sản phẩm 3">
</div>
<div class="decor-item item-4 float-3">
    <img src="4.jpg" alt="Sản phẩm 4">
</div>
<div class="decor-item item-5 float-5">
    <img src="5.jpg" alt="Sản phẩm 5">
</div>
<div class="decor-item item-6 float-2">
    <img src="6.jpg" alt="Sản phẩm 6">
</div>

<div class="decor-item blur-sm item-pineapple float-4">
    <img src="7.jpg" alt="Dứa">
</div>
<div class="decor-item blur-md item-rose float-6">
    <img src="8.jpg" alt="Hoa hồng">
</div>
<div class="decor-item blur-sm item-jasmine float-2">
    <img src="9.jpg" alt="Hoa nhài">
</div>
<div class="decor-item blur-md item-cinnamon float-5">
    <img src="10.jpg" alt="Quế">
</div>
<div class="decor-item blur-md item-coffee float-1">
    <img src="11.png" alt="Hạt cà phê">
</div>
<div class="decor-item blur-sm item-orange float-3">
    <img src="12.jpg" alt="Cam">
</div>

<div class="wrapper">
    <div class="container" id="mainBox">
        <img src="logo.png" class="logo" alt="HUST MEN Logo">
        <div class="title">HUST MEN</div>

        <p class="instruction">Xin hãy nhập thông tin của bạn</p>

        <form id="form">
            <input type="text" id="name" placeholder="Họ và tên" required>
            <input type="number" id="phone" placeholder="SĐT" required>
            <input type="text" id="problem" placeholder="Nghề nghiệp của bạn" required>
            
            <button type="submit">BẤM VÀO ĐỂ NHẬN QUÀ</button>
        </form>
    </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let problem = document.getElementById("problem").value;

    fetch("https://script.google.com/macros/s/AKfycbyVjJcCY69KV6w19trUxxzgS7vQuFes97XpQYw2h3vzHXaU7TzdlAaSr78IZFtlOpkj/exec?name=" 
        + encodeURIComponent(name)
        + "&phone=" + encodeURIComponent(phone)
        + "&problem=" + encodeURIComponent(problem),
    {
        method: "GET",
        mode: "no-cors"
    });

setTimeout(() => {
    window.location.href = "https://vn.shp.ee/TuGyf3Ro";
}, 500); // delay 0.5s
});
</script>

</body>
</html>
